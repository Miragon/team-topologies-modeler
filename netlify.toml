# Netlify deployment of the demo webapp (apps/webapp).
# npm-workspaces monorepo: based on package-lock.json, Netlify runs `npm install`
# automatically, then the build command builds the webapp.

[build]
  # Force base to the repo root (overrides any base possibly set in the Netlify UI), otherwise
  # publish resolves wrong. publish is relative to base.
  base = "/"
  # The webapp bundles the @miragon/team-topologies-* packages from source via Vite aliases (see vite.config.ts),
  # so it is self-contained -> no prior lib build needed.
  command = "npm run build:webapp"
  publish = "apps/webapp/dist"

[build.environment]
  NODE_VERSION = "22"

# Single-page app: the diagram lives in the URL hash (#d=...), routing is hash-based.
# The catch-all serves index.html for any path (robust against deep links).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
