name: Publish npm package

on:
  workflow_call:
    inputs:
      package:
        description: Package directory name under packages/
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Node 24 ships npm >= 11.5.1, which supports OIDC trusted publishing
      # (tokenless) — no global npm upgrade needed.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Publish @miragon/team-topologies-${{ inputs.package }}
        run: |
          dir="packages/${{ inputs.package }}"
          name="$(node -p "require('./$dir/package.json').name")"
          version="$(node -p "require('./$dir/package.json').version")"
          if npm view "$name@$version" version > /dev/null 2>&1; then
            echo "$name@$version already published — skipping"
          else
            npm publish -w "$dir" --provenance --access public
          fi
