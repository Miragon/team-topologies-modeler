name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly scan catches advisories published after a PR merged.
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload results to the Security tab
      actions: read # required for workflow visibility on private repos

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: github/codeql-action/init@v4.36.2
        with:
          languages: javascript-typescript
          # JS/TS is analysed from source — no compilation step needed.
          build-mode: none

      - uses: github/codeql-action/analyze@v4.36.2
        with:
          category: "/language:javascript-typescript"
