name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate packaging/publish without releasing"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release_please.outputs.releases_created }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - id: release_please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm-schema-model:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      package: schema-model

  publish-npm-renderer:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm-package.yml
    with:
      package: renderer

  publish-vscode:
    name: Publish to VS Code Marketplace
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build:vscode
      - name: Package extension
        working-directory: apps/vscode
        run: npx vsce package --no-dependencies -o team-topologies-modeler.vsix
      - name: Publish to VS Code Marketplace
        working-directory: apps/vscode
        run: npx vsce publish --packagePath team-topologies-modeler.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PUBLISH }}

  publish-ovsx:
    name: Publish to Open VSX Marketplace
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build:vscode
      - name: Package extension
        working-directory: apps/vscode
        run: npx vsce package --no-dependencies -o team-topologies-modeler.vsix
      - name: Publish to Open VSX Marketplace
        working-directory: apps/vscode
        run: npx ovsx --pat "$OVSX_PAT" publish --packagePath team-topologies-modeler.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PUBLISH }}

  dry-run:
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish -w packages/schema-model -w packages/renderer --access public --dry-run
      - run: npm run build:vscode
      - name: Package extension
        working-directory: apps/vscode
        run: npx vsce package --no-dependencies -o team-topologies-modeler.vsix
