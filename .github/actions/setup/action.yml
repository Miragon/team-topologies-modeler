name: Setup
description: Install Node and restore dependencies with a clean, lockfile-pinned npm install.

inputs:
  node-version:
    description: Node.js version (defaults to the engines floor so CI verifies the declared minimum).
    required: false
    default: 22.13.0

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - run: npm ci
      shell: bash
