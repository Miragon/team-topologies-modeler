packages:
  - "packages/*"
  - "apps/*"

allowBuilds:
  esbuild: set this to true or false

# Allow esbuild's install script (needed by Vite/Vitest).
onlyBuiltDependencies:
  - esbuild

# Don't re-run an install check before every `pnpm run <script>`; it otherwise
# fails on the (harmless) "ignored build scripts" notice in this sandbox.
verifyDepsBeforeRun: false
