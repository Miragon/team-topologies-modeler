"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = "npm install"
run_mode = "concurrent"
archive = "npx portless prune"

[scripts.run.webapp]
command = "npm run dev"
default = true
icon = "globe"

[scripts.run.vscode]
command = "npm run dev:vscode"
icon = "code"
